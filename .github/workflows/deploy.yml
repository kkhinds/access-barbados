name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Sync services + contact from admin backend
        env:
          # When the admin is live, set ADMIN_SYNC_URL repository variable to
          # e.g. https://access-barbados-admin.vercel.app/api/public/sync
          # If unset, the script logs a warning and uses the JSON already in the repo.
          ADMIN_SYNC_URL: ${{ vars.ADMIN_SYNC_URL }}
        run: node scripts/sync-from-admin.mjs

      - name: Build (static export for custom domain accessbim.com)
        env:
          # Leave BASE_PATH unset for the custom domain. If you ever revert to
          # kkhinds.github.io/access-barbados/, set BASE_PATH=/access-barbados.
          BASE_PATH: ""
          # Booking form POSTs here when set; otherwise falls back to mailto.
          NEXT_PUBLIC_BOOKING_ENDPOINT: ${{ vars.NEXT_PUBLIC_BOOKING_ENDPOINT }}
          # Cloudflare Turnstile site key. When set, forms render a verification
          # widget and require a token; when unset, forms work without bot protection.
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          # LocationIQ public token. When set, pickup + drop-off fields show a
          # Barbados-only place autocomplete with lat/lng. When unset they're
          # plain text inputs.
          NEXT_PUBLIC_LOCATIONIQ_TOKEN: ${{ vars.NEXT_PUBLIC_LOCATIONIQ_TOKEN }}
        run: npm run build

      - name: Add .nojekyll
        # Stops GitHub Pages from running Jekyll, which would hide _next/ directory
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
